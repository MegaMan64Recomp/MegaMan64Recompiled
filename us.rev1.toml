#Tagging - Embed Tag into Sprite BufferObj padding
[[patches.hook]]
func = "func_80028220_3620"
before_vram = 0x800283A0
text =	"""
			MEM_W(0X14, ctx->r4) = get_curr_gfx_tag(rdram, ctx);
			clear_curr_gfx_tag(rdram, ctx);
		"""

#Minimap cells alignment, don't apply alignment if opening the larger map
[[patches.hook]]
func = "func_8004AB78_25F78"
before_vram = 0x8004ABE0
text =	"""
			if (MEM_B(0xFFFFFFFF801BC3E8, 0) != 7) {
				recomp_context savedCtx = *ctx;
				recomp_insert_ui_elem_alignment(rdram, ctx);
				*ctx = savedCtx;
			}
		"""

#Minimap Background Rect alignment
[[patches.hook]]
func = "func_8004B408_26808"
before_vram = 0x8004B410
text =	"""
			recomp_context savedCtx = *ctx;
			recomp_insert_ui_elem_alignment(rdram, ctx);
			*ctx = savedCtx;
		"""

