# Config file for MegaMan 64 Recompilation.

[input]
entrypoint = 0x80025C00
output_func_path = "RecompiledFuncs"
symbols_file_path = "MegaMan64RecompSyms/megaman64.us.rev1.syms.toml"
rom_file_path = "MegaMan64.us.rev1.z64"

manual_funcs = [
]

[patches]
stubs = [
#	"func_80092EB0_6E2B0", # nuGfxTaskAllEndWait. Hangs indefinitly, likely due to threading issues
	"Graph_ThreadStop", # Function that stops the graphics thread. Not currently support by N64Recomp
	"func_80087590_62990", # Function that starts the graphics thread
]

ignored = [
]

# Hooks
#Overlay loading
[[patches.hook]]
func = "Overlay_Loader"
before_vram = 0x80027404
text = "recomp_load_overlays(rdram, ctx);"

#Fix to yield main thread
[[patches.hook]]
func = "func_8008A02C_6542C"
before_vram = 0x8008A0E8
text = "yield_self(rdram);"

#Tagging - Terrain
[[patches.hook]]
func = "func_8003912C_1452C"
before_vram = 0x80039DE0
text= """
	{
		recomp_context savedContext1 = *ctx;
		ctx->r4=ctx->r22; //Tile X
		ctx->r5=ctx->r30; //Tile Y
		recomp_tag_terrain(rdram, ctx);
		*ctx = savedContext1;
	}
	"""

